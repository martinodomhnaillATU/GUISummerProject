<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four in a Row</title>

  <!-- =======================================================
       Written by: Mairtín O Domhnaill
       Purpose:
       Loads Bootstrap and external stylesheet for the page.
       ======================================================= -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../CSS Files/Connect4.css">
</head>
<body>

  <div class="container">

    <!-- =======================================================
         Written by: Mairtín O Domhnaill
         Purpose:
         Navigation menu linking to other game pages.
         ======================================================= -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary p-2 text-center fs-1 text-primary bg-white mt-2 rounded-1">
      <div class="container-fluid">
        <a class="navbar-brand text-primary" href="#">Menu</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse fs-3" id="navbarNavAltMarkup">
          <div class="navbar-nav">
            <a class="nav-link" href="Home.html">Home</a>
            <a class="nav-link" href="Hangman.html">Hangman</a>
            <a class="nav-link active" href="Connect4.html">Connect-4</a>
            <a class="nav-link" href="QuizGame.html">Quiz Game</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- =======================================================
         Written by: Mairtín O Domhnaill
         Purpose:
         Main game title and instructions.
         ======================================================= -->
    <div class="banner">🎮 Welcome to Four in a Row</div>
    <p>Connect four pieces in a row before your opponent.</p>

    <!-- Turn display -->
    <div class="turn-alert" id="turnText">Player 1's Turn</div>

    <!-- Game board -->
    <div class="board" id="board"></div>

    <!-- =======================================================
         Written by: Mairtín O Domhnaill
         Purpose:
         Displays player scores.
         ======================================================= -->
    <div class="scoreboard">
      🟥 Player 1: <span id="p1Score">0</span> |
      ⚪ Player 2: <span id="p2Score">0</span>
    </div>

    <!-- Control buttons -->
    <div class="mt-3">
      <button class="btn btn-success" onclick="resetBoard()">Play Again</button>
      <button class="btn btn-danger" onclick="resetScores()">Reset Scores</button>
    </div>
  </div>

  <!-- Win Modal -->
  <div class="modal fade" id="winModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-dark text-center p-3">
        <h2 id="winnerText"></h2>
        <button class="btn btn-primary" id="playAgainBtn" data-bs-dismiss="modal">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Sound effects -->
  <audio id="dropSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
  <audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../JS files/Connect4.js"></script>

</body>
</html>
