<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four in a Row</title>

  <!-- Bootstrap 5 for modal and button styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Link to our external CSS file (sits in the CSS Files folder) -->
  <link rel="stylesheet" href="../CSS Files/Connect4.css">
</head>
<body>

  <!-- ── Page banner ── -->
  <div class="banner">🎮 Welcome to Four in a Row</div>
  <p>Connect four pieces in a row (horizontal, vertical, or diagonal) before your opponent!</p>

  <!-- Shows whose turn it currently is -->
  <div class="turn-alert" id="turnText">Player 1's Turn</div>

  <!-- The game board – cells are injected here dynamically by createBoard() in Connect4.js -->
  <div class="board" id="board"></div>

  <!-- Running score totals that persist across rounds -->
  <div class="scoreboard">
    🟥 Player 1: <span id="p1Score">0</span> |
    ⚪ Player 2: <span id="p2Score">0</span>
  </div>

  <br>
  <!-- Play Again resets the board but keeps scores; Reset Scores wipes both tallies -->
  <button class="btn btn-success mt-2" onclick="resetBoard()">Play Again</button>
  <button class="btn btn-danger  mt-2" onclick="resetScores()">Reset Scores</button>

  <!-- ── Win / Draw announcement modal ──
       Shown automatically when the round ends.
       The "Play Again" button inside it resets the board for the next round. -->
  <div class="modal fade" id="winModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-dark text-center p-3">
        <h2 id="winnerText"></h2>
        <!-- data-bs-dismiss closes the modal; onclick is assigned in Connect4.js -->
        <button class="btn btn-primary" id="playAgainBtn" data-bs-dismiss="modal">Play Again</button>
      </div>
    </div>
  </div>

  <!-- Sound effects played by Connect4.js -->
  <audio id="dropSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
  <audio id="winSound"  src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

  <!-- Link to our external JS file (sits in the JS files folder).
       Placed at the bottom of <body> so the HTML elements above exist
       in the DOM before the script tries to access them. -->
  <script src="../JS files/Connect4.js"></script>

</body>
</html>
